# Root-level Foundry config so etherform's deploy job (which runs from the repo
# root — see _deploy-testnet.yml) can execute contracts/script/Deploy.s.sol and
# leave broadcast/ artifacts where parse-broadcast.sh expects them. Day-to-day
# development happens in contracts/ with contracts/foundry.toml.
[profile.default]
src = "contracts/src"
test = "contracts/test"
script = "contracts/script"
libs = ["contracts/lib"]
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
